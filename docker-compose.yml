# Local dev infrastructure for Business OS.
# Postgres is the system of record (RLS, JSONB, ledger). Adminer is for manual inspection.
services:
  db:
    image: postgres:16
    container_name: businessos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-business_os}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - businessos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-business_os}"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: businessos_adminer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db

  # Embedded BI (DESIGN_SPEC §8). Metabase reads the business DB ONLY as the
  # read-only `analytics_ro` role over the redacted `analytics` schema of views
  # (added as a data source in Metabase's UI — see docs/METABASE_SETUP.md). Its
  # OWN app DB is the bundled H2 in the volume (use a dedicated Postgres in prod).
  # MB_EMBEDDING_SECRET_KEY must equal the API's METABASE_EMBED_SECRET so signed
  # embeds verify. In prod, point Metabase at a read replica using the same role.
  metabase:
    image: metabase/metabase:latest
    container_name: businessos_metabase
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${METABASE_PORT:-3000}:3000"
    environment:
      MB_EMBEDDING_SECRET_KEY: ${METABASE_EMBED_SECRET:-}
    volumes:
      - businessos_metabase:/metabase.db

volumes:
  businessos_pgdata:
  businessos_metabase:
